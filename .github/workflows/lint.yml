name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  check:
    name: Lint, type-check, and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.72.1
          cache: true

      - name: Ruff lint
        run: pixi run lint

      - name: Ruff format check
        run: pixi run ruff format --check .

      - name: Type-check (mypy)
        run: pixi run typecheck

      - name: Tests
        run: pixi run test
